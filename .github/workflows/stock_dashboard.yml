name: Stock Dashboard

on:
  schedule:
    - cron: '35 13 * * 1-5'
    - cron: '5 20 * * 5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install yfinance

      - name: Create email config
        run: |
          echo '{"app_password": "${{ secrets.GMAIL_APP_PASSWORD }}"}' > email_config.json

      - name: Run dashboard (daily Mon-Fri)
        if: github.event.schedule == '35 13 * * 1-5' || github.event_name == 'workflow_dispatch'
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python fetch_stock_volume.py

      - name: Run weekly summary (Friday only)
        if: github.event.schedule == '5 20 * * 5'
        run: python fetch_stock_volume.py --weekly

      - name: Push updated files to GitHub
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add dashboard.html history.json stock_data.json
          git diff --staged --quiet || git commit -m "auto update $(date +'%Y-%m-%d')"
          git push
